name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://gplx-api-xjfq.onrender.com/api' }}
          VITE_SHOW_INTERNAL_PAGES: ${{ vars.VITE_SHOW_INTERNAL_PAGES || 'false' }}
        run: npm run build

      - name: Add SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Add nojekyll marker
        run: touch frontend/dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          publish_branch: gh-pages

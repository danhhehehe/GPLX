services:
  - type: web
    name: gplx-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://danhhehehe.github.io
      - key: MONGO_URI
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
